syntax = "proto3";

package collector.v1;

import "google/protobuf/timestamp.proto";

option go_package = "yadro.com/course/proto/gen/go/collector/v1;collectorv1";

service Collector {
  rpc GetRepositoryInfo(GetRepositoryInfoRequest) returns (GetRepositoryInfoResponse);
}

message GetRepositoryInfoRequest {
  string url = 1;
}

message GetRepositoryInfoResponse {
  string full_name = 1;
  string description = 2;
  int64 stars = 3;
  int64 forks = 4;
  google.protobuf.Timestamp created_at = 5;
}
